name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch/tag when a new
# push arrives — prevents the duplicate CI spam when a push
# triggers both pull_request (via PR sync) and workflow_dispatch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test browser extension extractor
        run: node --test BrowserExtensions/tests/extractor.test.js

      # ── Debug build (fast, for PR checks) ──
      - name: Build (Debug)
        run: |
          xcodebuild build \
            -project ezclip.xcodeproj \
            -scheme ezclip \
            -configuration Debug \
            -destination "platform=macOS" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES

      # ── Release build + DMG ──
      - name: Build Release
        run: |
          xcodebuild build \
            -project ezclip.xcodeproj \
            -scheme ezclip \
            -configuration Release \
            -derivedDataPath .build \
            -destination "platform=macOS" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--deep"

      - name: Verify code signature
        run: |
          APP_PATH=$(find .build/Build/Products/Release -name "ezclip.app" -type d | head -1)
          echo "App bundle: $APP_PATH"
          codesign -dvvv "$APP_PATH" 2>&1 || true
          if [ -d "$APP_PATH/Contents/_CodeSignature" ]; then
            echo "✅ Ad-hoc code signature present"
          else
            echo "❌ NO code signature directory"
            exit 1
          fi

      - name: Package DMG
        run: |
          APP_PATH=$(find .build/Build/Products/Release -name "ezclip.app" -type d | head -1)
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist")
          ARCH=$(uname -m)

          DMG_NAME="ezclip-${VERSION}-${ARCH}.dmg"
          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING"

          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          mkdir -p build
          hdiutil create \
            -volname "ezclip" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "build/$DMG_NAME"

          echo "✅ DMG: build/$DMG_NAME"
          ls -lh "build/$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      # ── Update latest.json (release only) ──
      - name: Update latest.json
        if: ${{ github.event_name == 'release' }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_CLEAN="${VERSION#v}"
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" Resources/Info.plist)
          DMG_URL="https://github.com/KohliNaman/ezclip/releases/download/${VERSION}/${DMG_NAME}"

          cat > latest.json << JSONEOF
          {
            "version": "${VERSION_CLEAN}",
            "build": "${BUILD}",
            "url": "${DMG_URL}",
            "notes": "Update available. See GitHub Releases for details."
          }
          JSONEOF

          echo "✅ latest.json updated:"
          cat latest.json

      - name: Bump version for next release
        if: ${{ github.event_name == 'release' }}
        run: |
          CURRENT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Resources/Info.plist)
          CURRENT_BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" Resources/Info.plist)

          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          NEXT_BUILD=$((CURRENT_BUILD + 1))

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $NEXT_VERSION" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEXT_BUILD" Resources/Info.plist

          echo "✅ Bumped version: $CURRENT_VERSION (build $CURRENT_BUILD) -> $NEXT_VERSION (build $NEXT_BUILD)"

      - name: Commit and push latest.json + version bump
        if: ${{ github.event_name == 'release' }}
        run: |
          git config user.name "ezclip-bot"
          git config user.email "bot@ezclip.app"
          git config credential.helper '!gh auth git-credential'

          git add latest.json Resources/Info.plist
          git commit -m "latest.json: ${{ github.event.release.tag_name }}" || echo "No changes"
          git push origin HEAD:main || echo "Push failed (branch protection?)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ezclip-dmg
          path: build/ezclip-*.dmg
          retention-days: 30

      - name: Upload DMG to release
        if: ${{ github.event_name == 'release' }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "build/$DMG_NAME" \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
