name: Build

on:
  push:
    branches: [main, "feat/*"]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Quick build (for PR check speed) ──
      - name: Build (Debug)
        run: |
          xcodebuild build \
            -project ezclip.xcodeproj \
            -scheme ezclip \
            -configuration Debug \
            -destination "platform=macOS" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES

      # ── Release build + DMG (always, since build matrix is small) ──
      - name: Build Release
        run: |
          xcodebuild build \
            -project ezclip.xcodeproj \
            -scheme ezclip \
            -configuration Release \
            -derivedDataPath .build \
            -destination "platform=macOS" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--deep"

      - name: Verify code signature
        run: |
          APP_PATH=$(find .build/Build/Products/Release -name "ezclip.app" -type d | head -1)
          echo "App bundle: $APP_PATH"
          echo "---"
          codesign -dvvv "$APP_PATH" 2>&1 || true
          echo "---"
          if [ -d "$APP_PATH/Contents/_CodeSignature" ]; then
            echo "✅ Ad-hoc code signature present"
          else
            echo "❌ NO code signature directory"
            exit 1
          fi

      - name: Package DMG
        run: |
          APP_PATH=$(find .build/Build/Products/Release -name "ezclip.app" -type d | head -1)
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist")
          ARCH=$(uname -m)

          DMG_NAME="ezclip-${VERSION}-${ARCH}.dmg"
          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING"

          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          mkdir -p build
          hdiutil create \
            -volname "ezclip" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "build/$DMG_NAME"

          echo "✅ DMG: build/$DMG_NAME"
          ls -lh "build/$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ezclip-dmg
          path: build/ezclip-*.dmg
          retention-days: 30

      - name: Upload DMG to release
        if: ${{ github.event_name == 'release' }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "build/$DMG_NAME" \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
