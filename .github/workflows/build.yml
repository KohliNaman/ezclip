name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen xcpretty

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Debug, active arch only for CI speed)
        run: |
          xcodebuild build \
            -project ezclip.xcodeproj \
            -scheme ezclip \
            -configuration Debug \
            -destination "platform=macOS" \
            ONLY_ACTIVE_ARCH=YES \
            | xcpretty && exit ${PIPESTATUS[0]}
